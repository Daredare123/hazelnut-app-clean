workflows:
  capacitor-ios-production:
    name: Build Capacitor iOS App
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Clean environment and Install Node dependencies
        script: |
          cd HazelnutAppWrapper
          # Remove previous node_modules just in case (clean install)
          rm -rf node_modules package-lock.json
          npm install
      
      - name: Build web project
        script: |
          cd HazelnutAppWrapper
          # This app is a live wrapper, so no heavy frontend build is needed,
          # but we run npm run build to fulfill standard build pipeline requirements.
          npm run build
      
      - name: Add iOS platform
        script: |
          cd HazelnutAppWrapper
          npx cap add ios || true
      
      - name: Sync Capacitor iOS platform
        script: |
          cd HazelnutAppWrapper
          npx cap sync ios
      
      - name: Build iOS project for Release (Unsigned)
        script: |
          cd HazelnutAppWrapper/ios/App
          # We use xcodebuild directly without CODE_SIGNING to allow 
          # generation of the .app file without specific Apple Developer certificates on CI
          xcodebuild clean build \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            SYMROOT=$(pwd)/build
      
      - name: Package App to IPA
        script: |
          cd HazelnutAppWrapper/ios/App
          # Bundle the .app folder into an .ipa file
          mkdir -p build/Payload
          mv build/Release-iphoneos/*.app build/Payload/ || true
          cd build
          zip -qr ../../../HazelnutApp.ipa Payload
    
    artifacts:
      - HazelnutAppWrapper/HazelnutApp.ipa
      - HazelnutAppWrapper/ios/App/build/Release-iphoneos/*.app
